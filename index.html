<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Tomate</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7f5;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  background:white;
  width:90%;
  max-width:600px;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  text-align:center;
}

h1{
  color:#166534;
}

.step{
  display:none;
}

.step.active{
  display:block;
}

select{
  width:100%;
  padding:14px;
  margin-top:20px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  margin-top:25px;
  padding:12px 22px;
  border:none;
  border-radius:10px;
  background:#15803d;
  color:white;
  cursor:pointer;
  font-size:16px;
}

.result{
  background:#f0fdf4;
  padding:25px;
  border-radius:15px;
  margin-top:20px;
}

</style>

</head>
<body>

<div class="container">

<h1>Diagnóstico de tomate</h1>

<div class="step active" id="step1">

<h2>Lugar del síntoma</h2>

<select id="lugarSelect">
<option value="">Seleccione</option>
</select>

<button onclick="nextStep(1)">
Continuar
</button>

</div>

<div class="step" id="step2">

<h2>Si observa...</h2>

<select id="observaSelect">
<option value="">Seleccione</option>
</select>

<button onclick="prevStep(2)">Volver</button> <button onclick="nextStep(2)">Continuar</button>

</div>

<div class="step" id="step3">

<h2>Clave para descartar</h2>

<select id="claveSelect">
<option value="">Seleccione</option>
</select>

<button onclick="prevStep(3)">Volver</button> <button onclick="showResult()">Diagnóstico</button>

</div>

<div class="step" id="step4">

<div class="result">
<h2 id="diagnostico"></h2>
<p id="agente"></p>
</div>

<button onclick="restart()">Nuevo diagnóstico</button>

</div>

</div>

<script>

const data = [

{
  lugar:"Hoja",
  observa:"Marchitamiento",
  clave:"Amarillamiento unilateral",
  agente:"Hongo",
  diagnostico:"Fusarium"
},

{
  lugar:"Hoja",
  observa:"Manchas oscuras",
  clave:"Anillos concéntricos",
  agente:"Hongo",
  diagnostico:"Tizón temprano"
},

{
  lugar:"Fruto",
  observa:"Podredumbre",
  clave:"Zona negra hundida",
  agente:"Fisiológico",
  diagnostico:"Blossom end rot"
}

];

const lugarSelect = document.getElementById('lugarSelect');
const observaSelect = document.getElementById('observaSelect');
const claveSelect = document.getElementById('claveSelect');

const lugares = [...new Set(data.map(d => d.lugar))];

lugares.forEach(l => {

  const option = document.createElement('option');
  option.value = l;
  option.textContent = l;

  lugarSelect.appendChild(option);

});

lugarSelect.addEventListener('change', ()=>{

  observaSelect.innerHTML =
  '<option value="">Seleccione</option>';

  const opciones = [...new Set(

    data
    .filter(d => d.lugar === lugarSelect.value)
    .map(d => d.observa)

  )];

  opciones.forEach(o=>{

    const option = document.createElement('option');

    option.value = o;
    option.textContent = o;

    observaSelect.appendChild(option);

  });

});

observaSelect.addEventListener('change', ()=>{

  claveSelect.innerHTML =
  '<option value="">Seleccione</option>';

  const opciones = data.filter(d =>

    d.lugar === lugarSelect.value &&
    d.observa === observaSelect.value

  );

  opciones.forEach(o=>{

    const option = document.createElement('option');

    option.value = o.clave;
    option.textContent = o.clave;

    claveSelect.appendChild(option);

  });

});

function nextStep(step){

  let valid = true;

  if(step === 1 && !lugarSelect.value)
    valid = false;

  if(step === 2 && !observaSelect.value)
    valid = false;

  if(!valid){

    alert('Seleccione una opción');
    return;

  }

  document
  .getElementById(`step${step}`)
  .classList.remove('active');

  document
  .getElementById(`step${step+1}`)
  .classList.add('active');

}

function prevStep(step){

  document
  .getElementById(`step${step}`)
  .classList.remove('active');

  document
  .getElementById(`step${step-1}`)
  .classList.add('active');

}

function showResult(){

  const resultado = data.find(d =>

    d.lugar === lugarSelect.value &&
    d.observa === observaSelect.value &&
    d.clave === claveSelect.value

  );

  document.getElementById('diagnostico')
  .textContent = resultado.diagnostico;

  document.getElementById('agente')
  .textContent =
  'Tipo de agente: ' + resultado.agente;

  document
  .getElementById('step3')
  .classList.remove('active');

  document
  .getElementById('step4')
  .classList.add('active');

}

function restart(){

  location.reload();

}

</script>

</body>
</html>
