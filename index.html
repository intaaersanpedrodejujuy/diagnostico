<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Tomate</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f3f7f4;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:90%;
  max-width:650px;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  text-align:center;
}

h1{
  color:#166534;
  margin-bottom:10px;
}

.subtitle{
  color:#666;
  margin-bottom:30px;
}

.step{
  display:none;
}

.step.active{
  display:block;
}

select{
  width:100%;
  padding:14px;
  margin-top:20px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  margin-top:25px;
  padding:12px 24px;
  border:none;
  border-radius:12px;
  background:#15803d;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#166534;
}

.back{
  background:#d1d5db;
  color:#111;
  margin-right:10px;
}

.result{
  background:#f0fdf4;
  padding:25px;
  border-radius:18px;
  margin-top:20px;
  border:1px solid #bbf7d0;
}

.result h2{
  color:#166534;
  margin-bottom:10px;
}

.loading{
  color:#666;
  font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>Diagnóstico de enfermedades</h1>

<p class="subtitle">
Seleccione las características observadas
</p>

<div class="loading" id="loading">
Cargando base de diagnósticos...
</div>

<div class="step active" id="step1">

<h2>Lugar del síntoma</h2>

<select id="lugarSelect">
<option value="">Seleccione</option>
</select>

<button onclick="nextStep(1)">
Continuar
</button>

</div>

<div class="step" id="step2">

<h2>Si observa...</h2>

<select id="observaSelect">
<option value="">Seleccione</option>
</select>

<div>
<button class="back" onclick="prevStep(2)">
Volver
</button>

<button onclick="nextStep(2)">
Continuar
</button>
</div>

</div>

<div class="step" id="step3">

<h2>Clave para descartar</h2>

<select id="claveSelect">
<option value="">Seleccione</option>
</select>

<div>
<button class="back" onclick="prevStep(3)">
Volver
</button>

<button onclick="showResult()">
Ver diagnóstico
</button>
</div>

</div>

<div class="step" id="step4">

<div class="result">

<h2 id="diagnostico"></h2>

<p id="agente"></p>

</div>

<button onclick="restart()">
Nuevo diagnóstico
</button>

</div>

</div>

<script>

let data = [];

const lugarSelect = document.getElementById('lugarSelect');
const observaSelect = document.getElementById('observaSelect');
const claveSelect = document.getElementById('claveSelect');

async function cargarCSV(){

  const response = await fetch('datos.csv');

  const texto = await response.text();

  const filas = texto.trim().split('\\n');

  const headers = filas[0].split(';');

  data = filas.slice(1).map(fila => {

    const valores = fila.split(';');

    return {
      lugar: valores[0],
      observa: valores[1],
      clave: valores[2],
      agente: valores[3],
      diagnostico: valores[4]
    };

  });

  cargarLugares();

  document.getElementById('loading').style.display='none';

}

function cargarLugares(){

  const lugares = [...new Set(data.map(d => d.lugar))];

  lugares.forEach(l => {

    const option = document.createElement('option');

    option.value = l;
    option.textContent = l;

    lugarSelect.appendChild(option);

  });

}

lugarSelect.addEventListener('change', ()=>{

  observaSelect.innerHTML =
  '<option value=\"\">Seleccione</option>';

  claveSelect.innerHTML =
  '<option value=\"\">Seleccione</option>';

  const opciones = [...new Set(

    data
    .filter(d => d.lugar === lugarSelect.value)
    .map(d => d.observa)

  )];

  opciones.forEach(o => {

    const option = document.createElement('option');

    option.value = o;
    option.textContent = o;

    observaSelect.appendChild(option);

  });

});

observaSelect.addEventListener('change', ()=>{

  claveSelect.innerHTML =
  '<option value=\"\">Seleccione</option>';

  const opciones = data.filter(d =>

    d.lugar === lugarSelect.value &&
    d.observa === observaSelect.value

  );

  opciones.forEach(o => {

    const option = document.createElement('option');

    option.value = o.clave;
    option.textContent = o.clave;

    claveSelect.appendChild(option);

  });

});

function nextStep(step){

  if(step === 1 && !lugarSelect.value){

    alert('Seleccione una opción');
    return;

  }

  if(step === 2 && !observaSelect.value){

    alert('Seleccione una opción');
    return;

  }

  document
  .getElementById(`step${step}`)
  .classList.remove('active');

  document
  .getElementById(`step${step+1}`)
  .classList.add('active');

}

function prevStep(step){

  document
  .getElementById(`step${step}`)
  .classList.remove('active');

  document
  .getElementById(`step${step-1}`)
  .classList.add('active');

}

function showResult(){

  if(!claveSelect.value){

    alert('Seleccione una opción');
    return;

  }

  const resultado = data.find(d =>

    d.lugar === lugarSelect.value &&
    d.observa === observaSelect.value &&
    d.clave === claveSelect.value

  );

  document.getElementById('diagnostico')
  .textContent = resultado.diagnostico;

  document.getElementById('agente')
  .textContent =
  'Tipo de agente: ' + resultado.agente;

  document
  .getElementById('step3')
  .classList.remove('active');

  document
  .getElementById('step4')
  .classList.add('active');

}

function restart(){

  location.reload();

}

cargarCSV();

</script>

</body>
</html>
